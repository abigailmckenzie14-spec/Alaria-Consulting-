<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alaria Consulting</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    header {
      background: #000;
      color: #fff;
      padding: 15px;
      text-align: center;
    }

    nav {
      display: flex;
      justify-content: center;
      gap: 20px;
      background: #222;
      padding: 10px;
    }

    nav a {
      color: #fff;
      text-decoration: none;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: #fff;
      padding: 20px;
      margin: 10px 0;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .login-box {
      max-width: 400px;
      margin: 50px auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
    }

    button {
      width: 100%;
      padding: 10px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
    }

    #dashboard {
      display: none;
    }
  </style>
</head>
<body>

<header>
  <h1>Alaria Consulting</h1>
  <p>Airbnb Management & Consulting</p>
</header>

<nav>
  <a href="#">Home</a>
  <a href="#">Services</a>
  <a href="#login">Client Login</a>
</nav>

<div class="container">

  <div class="card">
    <h2>Welcome</h2>
    <p>We help Airbnb hosts maximize bookings and revenue.</p>
  </div>

  <!-- LOGIN -->
  <div id="login" class="login-box">
    <h2>Client Login</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard">
    <div class="card">
      <h2>Dashboard</h2>
      <p>Welcome, Host!</p>
    </div>

    <div class="card">
      <h3>Booking Status</h3>
      <ul>
        <li>April 10 - Booked</li>
        <li>April 12 - Available</li>
        <li>April 15 - Booked</li>
      </ul>
    </div>

    <div class="card">
      <h3>Calendar</h3>
      <iframe src="https://calendly.com" width="100%" height="400"></iframe>
    </div>

    <button onclick="logout()">Logout</button>
  </div>

</div>

<script>
  function login() {
    let user = document.getElementById('username').value;
    let pass = document.getElementById('password').value;

    if(user === "admin" && pass === "1234") {
      document.getElementById('dashboard').style.display = 'block';
      document.getElementById('login').style.display = 'none';
    } else {
      alert("Invalid login");
    }
  }

  function logout() {
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('login').style.display = 'block';
  }
</script>

</body>
</html>
